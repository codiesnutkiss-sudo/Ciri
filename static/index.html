<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciri | Cloud AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0c; color: #ffffff; font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }
        #gridCanvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: auto; }
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; pointer-events: none; }
        .interactive { pointer-events: auto; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .msg-animate { animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .glass-panel { background: rgba(16, 16, 18, 0.85); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .user-msg { background: #ffffff; color: #0a0a0c; border-radius: 16px 16px 4px 16px; }
        .ai-msg { background: transparent; border-left: 2px solid #ffffff; padding-left: 1rem; color: #e0e0e0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .prose pre { background: #111; padding: 12px; border-radius: 8px; border: 1px solid #333; overflow-x: auto; margin-top: 8px;}
        .prose code { font-family: monospace; color: #ccc; }
        .prose p { margin-bottom: 8px; }
    </style>
</head>
<body>

<canvas id="gridCanvas"></canvas>

<div id="ui-layer" class="p-4 md:p-8">
    <div class="interactive glass-panel rounded-2xl p-4 mb-6 flex justify-between items-center shadow-2xl">
        <h1 class="text-2xl font-black tracking-tighter text-white">CIRI <span class="text-gray-500 font-normal">CLOUD</span></h1>
        <div class="flex gap-3">
            <select id="model-select" class="bg-[#111] text-white text-sm px-4 py-2 rounded-lg border border-gray-800 outline-none focus:border-white transition-colors cursor-pointer">
                <option value="gpt-4">GPT-4o (Stable)</option>
                <option value="llama">Llama 3 (Stable)</option>
                <option value="deepseek">DeepSeek</option>
                <option value="gemini">Gemini Pro</option>
            </select>
            <button id="live-btn" onclick="toggleLiveMode()" class="bg-white text-black px-4 py-2 text-sm font-bold rounded-lg hover:bg-gray-200 transition-colors flex items-center gap-2">
                <span id="live-dot" class="w-2 h-2 rounded-full bg-black"></span> Live Vision
            </button>
        </div>
    </div>

    <div id="chat-box" class="interactive flex-1 overflow-y-auto space-y-6 mb-6 px-2 pb-4"></div>

    <div id="live-preview-container" class="interactive hidden mb-4 flex items-center gap-4 glass-panel p-2 rounded-xl w-max">
        <video id="screen-video" autoplay muted class="w-32 rounded-lg border border-gray-700"></video>
        <span class="text-xs text-gray-400 font-mono pr-4 animate-pulse">Capturing frames for analysis...</span>
        <canvas id="screen-canvas" class="hidden"></canvas>
    </div>

    <div class="interactive glass-panel rounded-2xl p-2 flex gap-2 items-center">
        <button onclick="document.getElementById('image-upload').click()" class="p-3 text-gray-400 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </button>
        <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
        <input type="text" id="user-input" placeholder="Message Ciri... (Try typing 'grhe')" class="flex-1 bg-transparent text-white px-2 py-3 outline-none text-sm placeholder-gray-600" onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()" class="bg-white text-black px-6 py-3 rounded-xl text-sm font-bold hover:bg-gray-200 transition-colors">Send</button>
    </div>
</div>

<script>
  const canvas = document.getElementById('gridCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let dots = [];
  const spacing = 35; 
  const mouse = { x: null, y: null, radius: 70 };

  window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
  window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); });

  class Dot {
    constructor(x, y) {
      this.baseX = x; this.baseY = y; this.x = x; this.y = y; this.size = 1.2;
      this.maxDisplacement = spacing * 0.6; 
    }
    draw(opacity, color) { ctx.fillStyle = color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    update() {
      let targetX = this.baseX; let targetY = this.baseY;
      let opacity = 0.2; let color = `rgba(150, 150, 170, ${opacity})`;
      if (mouse.x !== null) {
        let dx = this.baseX - mouse.x; let dy = this.baseY - mouse.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < mouse.radius) {
          let force = (mouse.radius - distance) / mouse.radius; let angle = Math.atan2(dy, dx);
          targetX = this.baseX + Math.cos(angle) * (force * this.maxDisplacement);
          targetY = this.baseY + Math.sin(angle) * (force * this.maxDisplacement);
          opacity = 0.2 + (force * 0.8); color = `rgba(255, 255, 255, ${opacity})`;
        }
      }
      this.x += (targetX - this.x) * 0.15; this.y += (targetY - this.y) * 0.15;
      this.draw(opacity, color);
    }
  }
  function init() {
    dots = [];
    for (let y = -spacing; y < canvas.height + spacing; y += spacing) {
      for (let x = -spacing; x < canvas.width + spacing; x += spacing) { dots.push(new Dot(x, y)); }
    }
  }
  function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < dots.length; i++) { dots[i].update(); } requestAnimationFrame(animate); }
  init(); animate();

  const chatBox = document.getElementById('chat-box');
  const userInput = document.getElementById('user-input');
  let isLiveMode = false;
  let screenStream = null;
  let uploadedImageBase64 = null;

  userInput.addEventListener('input', (e) => {
      if (e.target.value.includes("grhe")) userInput.value = e.target.value.replace("grhe", "Analyze the data on my screen.");
  });

  function handleImageUpload(event) {
      const file = event.target.files[0];
      if (file) {
          const reader = new FileReader();
          reader.onload = (e) => { uploadedImageBase64 = e.target.result; alert("Image attached to next message."); };
          reader.readAsDataURL(file);
      }
  }

  async function toggleLiveMode() {
      const btn = document.getElementById('live-btn');
      const dot = document.getElementById('live-dot');
      const preview = document.getElementById('live-preview-container');
      
      if (!isLiveMode) {
          try {
              screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
              document.getElementById('screen-video').srcObject = screenStream;
              isLiveMode = true;
              dot.className = "w-2 h-2 rounded-full bg-red-500 animate-pulse";
              preview.classList.remove('hidden');
          } catch (err) { alert("Screen share required for Live Vision."); }
      } else {
          screenStream.getTracks().forEach(track => track.stop());
          isLiveMode = false;
          dot.className = "w-2 h-2 rounded-full bg-black";
          preview.classList.add('hidden');
      }
  }

  function getFrame() {
      if (uploadedImageBase64) {
          let temp = uploadedImageBase64;
          uploadedImageBase64 = null; 
          return temp;
      }
      if (!isLiveMode) return null;
      
      const video = document.getElementById('screen-video');
      const canvas = document.getElementById('screen-canvas');
      
      // CRITICAL FIX: Downscale the image to prevent "Payload Too Large" crashes
      const MAX_WIDTH = 800;
      const scale = MAX_WIDTH / (video.videoWidth || 800);
      canvas.width = MAX_WIDTH;
      canvas.height = (video.videoHeight || 600) * scale;
      
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.4); // Compresses the image safely
  }

  async function sendMessage(retryText = null, retryModel = null) {
      const text = retryText || userInput.value.trim();
      if (!text) return;
      
      const model = retryModel || document.getElementById('model-select').value;
      userInput.value = '';

      if (!retryText) appendUserMessage(text);
      const imgData = getFrame();
      const aiMsgId = 'msg-' + Date.now();
      appendAIMessage(aiMsgId);

      try {
          const res = await fetch('/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: text, model: model, image: imgData })
          });
          const data = await res.json();
          updateAIMessage(aiMsgId, data.text, data.model, data.time, text);
      } catch (e) {
          updateAIMessage(aiMsgId, "Critical network failure.", model, "0s", text);
      }
  }

  function appendUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'msg-animate flex justify-end';
      div.innerHTML = `<div class="user-msg p-4 max-w-[80%] text-sm shadow-xl">${text}</div>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
  }

  function appendAIMessage(id) {
      const div = document.createElement('div');
      div.id = id;
      div.className = 'msg-animate flex justify-start mb-8';
      div.innerHTML = `<div class="ai-msg max-w-[90%] text-sm"><span class="animate-pulse text-gray-500 font-mono text-xs">Processing...</span></div>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
  }

  function updateAIMessage(id, text, model, time, origText) {
      const div = document.getElementById(id);
      const formattedText = marked.parse(text);
      
      div.innerHTML = `
          <div class="ai-msg max-w-[90%] text-sm prose prose-invert">
              ${formattedText}
              <div class="mt-4 flex gap-4 text-[10px] uppercase tracking-widest text-gray-600 font-mono border-t border-gray-800 pt-2">
                  <span class="text-white">${model}</span>
                  <span>${time}</span>
                  <button onclick="sendMessage('${origText.replace(/'/g, "\\'")}', '${model}')" class="hover:text-white transition-colors">↻ Retry</button>
              </div>
          </div>
      `;
      chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
</body>
</html>
